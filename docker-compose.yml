services:
  postgres:
    image: apache/age:release_PG16_1.6.0
    container_name: apache-age-experiment-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - ./.docker/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  age-viewer:
    image: sorrell/apache-age-viewer:latest
    container_name: apache-age-experiment-viewer
    ports:
      - 3001:3001
    depends_on:
      - postgres
